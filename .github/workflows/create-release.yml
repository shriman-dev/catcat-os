---
name: Create Release
on:  # yamllint disable-line rule:truthy
  workflow_call:
  workflow_dispatch:
    inputs:
      run-id:
        description: "The Run-ID for the workflow."
        type: number
        required: true
permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: url-catcat*
          merge-multiple: true
          run-id: ${{ inputs.run-id || github.run_id }}
          github-token: ${{ github.token }}

      - name: Prepare Release Text
        id: prepare-release
        shell: bash
        run: |
          set -eoux pipefail
          pwd
          ls -A1
          TIMESTAMP="$(date "+%Y%m%d")"
          MAJOR_VERSION="$(cat ${{ github.workspace }}/files/major_version)"
          TITLE="CaCat OS ${MAJOR_VERSION} (${TIMESTAMP})"
          TAG="${MAJOR_VERSION}.${TIMESTAMP}"
          echo '### ISOs to Download' > release.md
          for artifact in $(find url-catcat*); do
            cat $artifact >> release.md
          done
          cat release.md
          echo "title=${TITLE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.prepare-release.outputs.title }}
          tag_name: ${{ steps.prepare-release.outputs.tag }}
          body_path: ./changelog.md
          make_latest: true
