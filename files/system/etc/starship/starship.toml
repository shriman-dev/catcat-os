# modified = " ÔĀÄ ${count}" # nf-fa-pencil
renamed = "ůįóß ${count}, " # nf-md-cursor_text
untracked = "ÔĄ® ${count}, " # nf-fa-question
deleted = "ÔÄć ${count}, " # nf-fa-remove
conflicted = "ÔÄ§ ${count}, " # nf-fa-flag
stashed = "ÔÜú  ${count}, " # nf-fa-bank
# stashed = " ÔÄú ${count}, " # nf-fa-inbox
