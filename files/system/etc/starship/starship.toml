diverged = "ůį°Ź ${ahead_count} ${behind_count}, " # nf-md-arrow_expand_vertical
# diverged = "ůįĮé ${ahead_count} ${behind_count}" # nf-md-swap_vertical_bold
# ignore_submodules = true
format = "[ ($staged$modified$renamed$untracked$deleted$conflicted$stashed$ahead_behind)]($style)"

[git_state]
