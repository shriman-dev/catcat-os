[custom.giturl]
description = "Display icon for remote Git server"
command = """
    GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
    if [[ "$GIT_REMOTE" =~ "github" ]]; then
        # GIT_REMOTE_SYMBOL="¯«í" 
        GIT_REMOTE_SYMBOL="´éø" 
    elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
        GIT_REMOTE_SYMBOL="´èû" 
    elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
        GIT_REMOTE_SYMBOL="´à▒" 
    elif [[ "$GIT_REMOTE" =~ "git" ]]; then
        GIT_REMOTE_SYMBOL="´çÆ" 
    #else
        #GIT_REMOTE_SYMBOL="¾░èó " 
        # GIT_REMOTE_SYMBOL="´äº" 
        # GIT_REMOTE_SYMBOL="¾░£ø" 
    fi
    echo "$GIT_REMOTE_SYMBOL"
    """
#require_repo = true
when = true
shell = ["bash", "--noprofile", "--norc"]
format = "[( $output )](bold)"

[git_branch]
symbol = "´Éÿ" #"¾░èó "
style = "fg:blue"
# always_show_remote = true
# truncation_length = 4 # default = 9223372036854775807
# truncation_symbol = "" # default = "ÔÇª"
# only_attached = true
# ignore_branches = ["main", "master"]
format = "[ $symbol $branch(:$remote_name)]($style)"
## other variables:
##   remote_branch = The name of the branch tracked on remote_name

[git_commit]
style = "bold"
commit_hash_length = 4 # default = 7
# only_detached = false
tag_disabled = false
