format = "[ ´èÆ $hash $tag ]($style)" # ´èÆ = nf-fa-hashtag

[git_status]
style = "bold"
staged = "¾▒ñº ${count} "
modified = "¾░úò ${count} "
renamed = "¾▒×ç ${count} "
untracked = "¾▒öó ${count} "
deleted = "¾░Üâ ${count} "
conflicted = "¾░ï¢ ${count} "
stashed = "´ö× ${count} "
up_to_date = ""
ahead = "¾░×Ö ${count} " # nf-md-arrow_expand_up
behind = "¾░×û ${count} " # nf-md-arrow_expand_down
diverged = "¾░íÅ ${ahead_count} ${behind_count} " # nf-md-arrow_expand_vertical
# diverged = "¾░»Ä ${ahead_count} ${behind_count}" # nf-md-swap_vertical_bold
# ignore_submodules = true
#format = "[ ($staged$modified$renamed$untracked$deleted$conflicted$stashed$ahead_behind)]($style)"
format = " [$staged](green)[$modified](yellow)[$renamed](bringht-cyan)[$untracked](cyan)[$deleted](red)[$conflicted](bringht-red)[$stashed](bringht-yellow)[$ahead_behind](purple)"

[git_state]
style = "bold"
rebase = "rebasing"
merge = "merging"
revert = "reverting"
cherry_pick = "¯èø picking" 
bisect = "bisecting"
am = "am'ing"
