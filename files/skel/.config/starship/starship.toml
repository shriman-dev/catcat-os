# only_nonzero_diffs = false
format = '([¾░║¬ ](green)[$added](green))([ ¾░║¿ ](red)[$deleted ](red))' # ¾░║¬ = nf-md-text_box_plus // ¾░║¿ = nf-md-text_box_minus



