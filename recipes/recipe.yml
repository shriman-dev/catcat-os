      #- btdu
      - btop
      - ncdu
      - fio
      #- yazi
      - fzf
      - fd-find
      - ripgrep
      - zoxide
      #
      - dosfstools
      - exfatprogs
      - dmraid
      - zstd
      - gpart
      - gparted

      # terminal tools
      - aria2
      #- ascii-image-converter
      - asciinema
      - brightnessctl
      - ffmpeg
      - hwinfo
      - kpcli
      - zenity
      #- keepass-diff
      - tealdeer
