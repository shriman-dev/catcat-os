      - cmatrix
      - cava
      - neo
      - oneko
      - sl
      - cbonsai
      - cowsay
      - fortune-mod
      #- pokemonsay-newgenerations

      # dev tools
      - ptyxis
      - git
      - lazygit
      - micro
      - neovim
      - tmux
      - sassc
      - zed
      - codium

